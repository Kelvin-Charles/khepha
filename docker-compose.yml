version: '3.8'

services:
  web:
    build: .
    container_name: oit237_web
    ports:
      - "9098:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=oit237_db
    depends_on:
      - db
    restart: always

  db:
    image: mariadb:10.11
    container_name: oit237_db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=oit237_db
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

volumes:
  db_data:
